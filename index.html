<script>

const SUPABASE_URL = "https://mdkpnbpuytnnjlovffqo.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ka3BuYnB1eXRubmpsb3ZmZnFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzExNTIsImV4cCI6MjA4ODgwNzE1Mn0.UV_ako1fE_BzSlLzDwxtX9b7Sl5t8gRLS48kCabg3Cw"

const supabase = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function add(amount){

await supabase.from('money_events').insert({
room:'main',
amount:amount,
type:'add'
})

}

async function load(){

let {data}=await supabase
.from('money_events')
.select('*')

let total=0

data.forEach(e=>{
total+=e.amount
})

document.getElementById("total").innerText=total

}

setInterval(load,1000)

</script>
