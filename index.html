<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Money Counter</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family:sans-serif;
      text-align:center;
      background:#fafafa;
      padding:24px;
    }

    button{
      font-size:20px;
      margin:10px;
      padding:15px;
    }

    .total{
      font-size:40px;
      margin:20px;
    }

    .error{
      color:red;
      margin-top:16px;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

  <h1>みんなの金額メーター</h1>

  <div class="total" id="total">0</div>

  <button onclick="add(100)">+100</button>
  <button onclick="add(500)">+500</button>
  <button onclick="add(1000)">+1000</button>

  <div id="error" class="error"></div>

  <script>
    const SUPABASE_URL = "https://mdkpnbpuytnnjlovffqo.supabase.co";
    const SUPABASE_KEY = "YOUR_ANON_KEY";
    const ROOM = "main";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function add(amount){
      document.getElementById("error").innerText = "";

      const { error } = await client.from("money_events").insert({
        room: ROOM,
        amount: amount,
        type: "add"
      });

      if (error) {
        document.getElementById("error").innerText =
          "insert error: " + JSON.stringify(error, null, 2);
        return;
      }

      await load();
    }

    async function load(){
      document.getElementById("error").innerText = "";

      const { data, error } = await client
        .from("money_events")
        .select("*")
        .eq("room", ROOM);

      if (error) {
        document.getElementById("error").innerText =
          "select error: " + JSON.stringify(error, null, 2);
        return;
      }

      let total = 0;

      data.forEach(e => {
        if (e.type === "add") total += Number(e.amount || 0);
        if (e.type === "sub") total -= Number(e.amount || 0);
      });

      document.getElementById("total").innerText = total;
    }

    load();
    setInterval(load, 1000);
  </script>

</body>
</html>
